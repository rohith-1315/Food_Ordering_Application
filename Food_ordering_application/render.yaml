services:
  - type: web
    name: food-ordering-backend
    runtime: docker
    rootDir: food-ordering-backend
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CACHE_TYPE
        value: simple
      - key: SPRING_PROFILES_ACTIVE
        value: prod
